schemaVersion: 1
name: "srvcs-between"
slug: "between"
repository: "srvcs/between"
package: "srvcs-between"
function: "comparison: is value within [lo, hi]"
kind: "orchestrator"
categories:
  - "comparison"
dependencies:
  - slug: "greaterthanorequalto"
    service: "srvcs-greaterthanorequalto"
  - slug: "lessthanorequalto"
    service: "srvcs-lessthanorequalto"
  - slug: "and"
    service: "srvcs-and"
endpoints:
  - method: "GET"
    path: "/"
    purpose: "Service identity"
  - method: "POST"
    path: "/"
    purpose: "Evaluate the service function"
  - method: "GET"
    path: "/healthz"
    purpose: "Liveness probe"
  - method: "GET"
    path: "/readyz"
    purpose: "Readiness probe"
  - method: "GET"
    path: "/metrics"
    purpose: "Prometheus metrics"
  - method: "GET"
    path: "/openapi.json"
    purpose: "OpenAPI document"
inputs:
  - name: "value"
    type: "json"
    required: true
  - name: "lo"
    type: "json"
    required: true
  - name: "hi"
    type: "json"
    required: true
outputs:
  - name: "value"
    type: "json"
  - name: "lo"
    type: "json"
  - name: "hi"
    type: "json"
  - name: "result"
    type: "boolean"
configuration:
  - name: "SRVCS_BIND_ADDR"
    default: "0.0.0.0:8080"
    purpose: "Bind address"
  - name: "SRVCS_ENV"
    default: "development"
    purpose: "Environment label for logs"
  - name: "RUST_LOG"
    default: "info,tower_http=info"
    purpose: "Tracing filter"
  - name: "SRVCS_AND_URL"
    default: "http://127.0.0.1:8086"
    purpose: "Base URL for srvcs-and"
  - name: "SRVCS_GREATERTHANOREQUALTO_URL"
    default: ""
    purpose: "Base URL for srvcs-greaterthanorequalto"
  - name: "SRVCS_LESSTHANOREQUALTO_URL"
    default: ""
    purpose: "Base URL for srvcs-lessthanorequalto"
